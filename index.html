<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم دبل | Double Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#C5A059',
                            burgundy: '#631021',
                            cream: '#F9F6F0',
                            dark: '#1A1A1A',
                        }
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            background-color: #F9F6F0;
            color: #1A1A1A;
            font-family: 'Cairo', sans-serif;
        }

        .menu-dashed {
            border-bottom: 2px dashed rgba(99, 16, 33, 0.1);
        }
    </style>
</head>

<body x-data="doubleApp()" x-cloak>

    <!-- Notification -->
    <div class="fixed top-10 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs px-4 pointer-events-none">
        <template x-if="notification.show">
            <div
                class="bg-brand-burgundy text-white py-3 px-6 rounded-2xl shadow-2xl flex items-center gap-3 animate__animated animate__fadeInDown">
                <div class="bg-brand-gold p-1 rounded-full">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <span class="font-bold text-sm" x-text="notification.message"></span>
            </div>
        </template>
    </div>

    <!-- Landing Page -->
    <div x-show="view === 'landing'"
        class="relative min-h-screen flex flex-col items-center justify-center p-6 bg-brand-cream overflow-hidden">
        <div
            class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')] opacity-40">
        </div>

        <div class="relative z-10 mb-8 animate__animated animate__zoomIn">
            <div
                class="relative p-2 rounded-full bg-white shadow-2xl border-4 border-brand-burgundy/10 overflow-hidden">

                    class="w-48 h-48 object-cover rounded-full">
            </div>
        </div>

        <div class="text-center z-10 mb-10 animate__animated animate__fadeInUp">
            <h1 class="text-4xl font-black mb-2 text-brand-burgundy tracking-tight">مطعم دبل <span

            <p class="text-brand-burgundy/60 text-lg font-bold">أشهى المشويات والشاورما والفطائر</p>

        <div class="grid gap-4 w-full max-w-sm sm:max-w-md md:max-w-lg z-10">
            <button @click="view = 'menu'"

                        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <path d="M3 6h18" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                    <span class="text-lg font-black">اطلب الان</span>
                </div>
                <svg class="w-5 h-5 text-white/40 group-hover:-translate-x-1 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>

            <div class="grid grid-cols-4 gap-3 sm:gap-4 animate__animated animate__fadeInUp"
                style="animation-delay: 0.2s">
                <button @click="window.open('https://www.tiktok.com/@shawarma.doubel', '_blank')"
                    class="flex flex-col items-center justify-center p-3 sm:p-4 rounded-2xl bg-white border border-brand-burgundy/5 shadow-sm text-brand-burgundy hover:bg-black hover:text-white hover:scale-105 transition-all">
                    <svg class="w-6 h-6 sm:w-7 sm:h-7 mb-2" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.89-.6-4.13-1.47V15.5a8.074 8.074 0 0 1-3.21 6.53 8.12 8.12 0 0 1-10.89-1.12A8.135 8.135 0 0 1 10.44 7.6c.45-.06.91-.07 1.36-.01V11.8a4.13 4.13 0 0 0-3.32 3.6c-.34 2.24 1.33 4.41 3.58 4.75a4.136 4.136 0 0 0 4.67-4.12V.02h-4.21z" />
                    </svg>
                    <span class="text-[9px] sm:text-[11px] font-black uppercase">TikTok</span>
                </button>
                <button @click="window.open('https://www.snapchat.com/add/shawarma.doubel', '_blank')"
                    class="flex flex-col items-center justify-center p-3 sm:p-4 rounded-2xl bg-white border border-brand-burgundy/5 shadow-sm text-brand-burgundy hover:bg-[#FFFC00] hover:text-black hover:scale-105 transition-all">
                    <svg class="w-6 h-6 sm:w-7 sm:h-7 mb-2" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2.4c-4.1 0-7 3-7 6.1 0 .6.3 1.2.6 1.8.3.6.4 1.1.4 1.7 0 1.2-.8 1.8-1.7 1.8-.1 0-.3 0-.4-.1-.1-.7-.8-1.2-1.5-1.2-.8 0-1.5.7-1.5 1.5 0 .2 0 .4.1.6 1.1.5 1.7 1.4 1.7 2.4 0 2.2 2.1 3.5 4.5 3.5.3 0 .6 0 .8-.1.7.9 1.9 1.5 3.2 1.5 1.3 0 2.4-.6 3.2-1.5.3.1.6.1.8.1 2.4 0 4.5-1.3 4.5-3.5 0-1 .6-1.9 1.7-2.4.1-.2.1-.4.1-.6 0-.8-.7-1.5-1.5-1.5-.7 0-1.4.5-1.5 1.2-.1 0-.3.1-.4.1-.9 0-1.7-.6-1.7-1.8 0-.6.1-1.1.4-1.7.3-.6.6-1.2.6-1.8 0-3.1-2.9-6.1-7-6.1z" />
                    </svg>
                    <span class="text-[9px] sm:text-[11px] font-black uppercase">Snap</span>
                </button>
                <button
                    @click="window.open('https://www.instagram.com/shawarma.doubel?igsh=M2lxeGRkMjl4MXJk', '_blank')"
                    class="flex flex-col items-center justify-center p-3 sm:p-4 rounded-2xl bg-white border border-brand-burgundy/5 shadow-sm text-brand-burgundy hover:bg-gradient-to-tr hover:from-[#f09433] hover:via-[#dc2743] hover:to-[#bc1888] hover:text-white hover:scale-105 transition-all">
                    <svg class="w-6 h-6 sm:w-7 sm:h-7 mb-2" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                    </svg>
                    <span class="text-[9px] sm:text-[11px] font-black uppercase">Insta</span>
                </button>
                <button @click="showHours = true"
                    class="flex flex-col items-center justify-center p-3 sm:p-4 rounded-2xl bg-white border border-brand-burgundy/5 shadow-sm text-brand-burgundy hover:bg-brand-burgundy hover:text-white hover:scale-105 transition-all">
                    <svg class="w-6 h-6 sm:w-7 sm:h-7 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    <span class="text-[9px] sm:text-[11px] font-black uppercase">وقت العمل</span>
                </button>
            </div>

            <button @click="window.open('https://maps.app.goo.gl/iQPoxnSL24Umq9rR6?g_st=ac', '_blank')"
                class="flex items-center justify-between px-8 py-5 rounded-[24px] bg-brand-gold text-white shadow-lg group hover:scale-[1.02] transition-all animate__animated animate__fadeInUp"
                style="animation-delay: 0.3s">
                <div class="flex items-center gap-5">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    <span class="text-lg font-black">موقعنا علي الخريطة</span>
                </div>
                <svg class="w-5 h-5 text-white/40 group-hover:-translate-x-1 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
        </div>


        <!-- Footer Section (Landing Page) -->
        <div
            class="mt-16 pt-8 border-t border-brand-burgundy/10 flex flex-col items-center justify-center space-y-4 w-full max-w-lg z-10">
            <p class="text-sm font-bold text-brand-burgundy/60">جميع الحقوق محفوظة © 2024 دبل</p>
            <div
                class="flex flex-col items-center gap-2 bg-white/50 px-8 py-5 rounded-3xl border border-brand-burgundy/5 shadow-sm w-full">
                <span class="text-xs font-black text-brand-burgundy/80 uppercase tracking-widest">تصميم وتطوير
                    المنيو</span>
                <div class="flex items-center gap-4 mt-1">
                    <span class="font-black text-brand-burgundy text-xl">Abduirhman Salem</span>
                    <a href="https://wa.me/966550340929" target="_blank"
                        class="flex items-center justify-center w-10 h-10 rounded-full bg-[#25D366] text-white shadow-lg hover:scale-110 hover:shadow-xl transition-all">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12.031 0C5.385 0 0 5.386 0 12.031c0 2.127.553 4.185 1.6 6.002L.202 23.364l5.485-1.439a12.022 12.022 0 0 0 6.344 1.777c6.646 0 12.031-5.386 12.031-12.032S18.677 0 12.031 0zm0 21.671a9.98 9.98 0 0 1-5.1-1.391l-.365-.217-3.791.995.998-3.696-.238-.378a9.957 9.957 0 0 1-1.536-5.323C2.001 6.136 6.505 1.632 12.031 1.632s10.03 4.504 10.03 10.03-4.504 10.03-10.03 10.03zM17.527 13.5c-.302-.152-1.785-.882-2.062-.982-.277-.101-.478-.152-.679.151-.202.303-.781.983-.956 1.183-.176.202-.352.227-.654.076-.302-.151-1.275-.47-2.428-1.5-.898-.802-1.503-1.795-1.68-2.097-.176-.303-.018-.466.133-.618.136-.135.302-.353.453-.529.151-.176.201-.303.302-.505.101-.202.05-.38-.025-.531-.076-.152-.68-1.643-.932-2.25-.246-.593-.497-.512-.68-.521-.175-.009-.376-.009-.577-.009-.202 0-.528.076-.804.378-.277.303-1.055 1.033-1.055 2.518 0 1.485 1.08 2.92 1.231 3.12.151.202 2.13 3.243 5.16 4.545.722.31 1.285.495 1.724.634.726.231 1.388.198 1.908.12.584-.087 1.785-.73 2.036-1.433.251-.703.251-1.306.176-1.433-.075-.126-.277-.202-.579-.353z" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu Page -->
    <div x-show="view === 'menu'" class="min-h-screen bg-brand-cream">
        <header
            class="sticky top-0 z-40 bg-brand-cream/90 backdrop-blur-md px-6 py-4 flex items-center justify-between border-b border-brand-burgundy/10">
            <button type="button" @click="view = 'landing'"
                class="p-2 rounded-full bg-white shadow-sm text-brand-burgundy hover:bg-brand-burgundy hover:text-white transition-all cursor-pointer relative z-50">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
            <div class="flex flex-col items-center">
                <span class="text-xl font-black text-brand-burgundy uppercase tracking-tighter">DOUBLE</span>
            </div>
            <button @click="showCart = true" class="relative p-2 rounded-full bg-white shadow-sm text-brand-burgundy">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="8" cy="21" r="1" />
                    <circle cx="19" cy="21" r="1" />
                    <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
                </svg>
                <span x-show="cartItemsCount() > 0"
                    class="absolute -top-1 -right-1 bg-brand-burgundy text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-sm"
                    x-text="cartItemsCount()"></span>
            </button>
        </header>

        <div class="bg-brand-cream border-b border-brand-burgundy/5 py-6 px-6 overflow-x-auto no-scrollbar">
            <div class="flex gap-4 min-w-max pb-2">
                <template x-for="cat in categories" :key="cat.id">
                    <button @click="activeCategory = cat.id; document.querySelector('main').scrollTo(0,0)"
                        class="flex flex-col items-center justify-center p-4 rounded-[28px] transition-all duration-300 min-w-[90px] border-2"
                        :class="activeCategory === cat.id ? 'bg-brand-burgundy text-brand-gold border-transparent shadow-xl scale-105' : 'bg-white text-brand-burgundy/40 border-brand-burgundy/5'">
                        <span class="text-3xl mb-2 animate__animated animate__pulse animate__infinite"
                            x-text="cat.icon"></span>
                        <span class="text-[10px] font-black uppercase tracking-tight" x-text="cat.name"></span>
                    </button>
                </template>
            </div>
        </div>

        <main class="px-6 py-8 w-full max-w-6xl mx-auto pb-40">
            <div class="flex items-center gap-4 mb-10 overflow-hidden">
                <div class="h-[1px] flex-1 bg-brand-burgundy/10"></div>
                <h2 class="text-2xl font-black text-brand-burgundy"
                    x-text="categories.find(c => c.id === activeCategory).name"></h2>
                <div class="h-[1px] flex-1 bg-brand-burgundy/10"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                <template x-for="item in filteredItems()" :key="item.id">
                    <div
                        class="group animate__animated animate__fadeInUp bg-white p-6 rounded-[28px] shadow-sm border border-brand-burgundy/5 hover:shadow-xl hover:scale-[1.02] transition-all duration-300 flex flex-col h-full">
                        <div class="flex justify-between items-start gap-4 mb-4">
                            <div class="flex-1">
                                <h3 class="text-lg font-extrabold text-brand-burgundy mb-1" x-text="item.name"></h3>
                                <p x-show="item.description"
                                    class="text-xs text-brand-burgundy/40 leading-relaxed italic"
                                    x-text="item.description"></p>
                            </div>
                            <div
                                class="text-brand-burgundy font-black text-lg whitespace-nowrap bg-brand-cream px-3 py-1 rounded-xl">
                                <template x-if="!item.sizes && !item.variants">
                                    <span><span x-text="item.price"></span> <span class="text-[10px]">ر.س</span></span>
                                </template>
                            </div>
                        </div>

                        <div class="mt-auto">
                            <!-- Price Tabs for Sizes (Small/Medium/Large) -->
                            <div x-show="item.sizes" class="grid grid-cols-3 gap-2">
                                <template x-for="size in ['small', 'medium', 'large']" :key="size">
                                    <template x-if="item.sizes && item.sizes[size]">
                                        <button
                                            @click="addToCart(item, { label: size === 'small' ? 'صغير' : size === 'medium' ? 'وسط' : 'كبير', price: item.sizes[size] })"
                                            class="flex flex-col items-center p-3 rounded-2xl bg-brand-cream border border-brand-burgundy/5 hover:bg-brand-burgundy hover:text-white transition-all group/btn">
                                            <span
                                                class="text-[10px] font-bold text-brand-burgundy/60 uppercase mb-1 group-hover/btn:text-white/80"
                                                x-text="size === 'small' ? 'صغير' : size === 'medium' ? 'وسط' : 'كبير'"></span>
                                            <span class="font-black"><span x-text="item.sizes[size]"></span> <span
                                                    class="text-[8px]">ر.س</span></span>
                                        </button>
                                    </template>
                                </template>
                            </div>

                            <!-- Single/Double for Burger -->
                            <div x-show="item.variants" class="grid grid-cols-2 gap-2">
                                <template x-for="variant in ['single', 'double']" :key="variant">
                                    <template x-if="item.variants && item.variants[variant]">
                                        <button
                                            @click="addToCart(item, { label: variant === 'single' ? 'سنجل' : 'دبل', price: item.variants[variant] })"
                                            class="flex flex-col items-center p-3 rounded-2xl bg-brand-cream border border-brand-burgundy/5 hover:bg-brand-burgundy hover:text-white transition-all group/btn">
                                            <span
                                                class="text-[10px] font-bold text-brand-burgundy/60 uppercase mb-1 group-hover/btn:text-white/80"
                                                x-text="variant === 'single' ? 'سنجل' : 'دبل'"></span>
                                            <span class="font-black"><span x-text="item.variants[variant]"></span> <span
                                                    class="text-[8px]">ر.س</span></span>
                                        </button>
                                    </template>
                                </template>
                            </div>

                            <!-- Basic Add Button -->
                            <template x-if="!item.sizes && !item.variants">
                                <button @click="addToCart(item)"
                                    class="w-full bg-brand-cream border border-brand-burgundy/10 text-brand-burgundy py-3 rounded-xl font-bold text-xs hover:bg-brand-burgundy hover:text-white transition-all flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path d="M12 5v14M5 12h14" />
                                    </svg>
                                    إضافة للطلب
                                </button>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Footer Section -->
            <div
                class="mt-16 pt-8 border-t border-brand-burgundy/10 flex flex-col items-center justify-center space-y-4 pb-10">
                <p class="text-sm font-bold text-brand-burgundy/60">جميع الحقوق محفوظة © 2024 دبل</p>
                <div
                    class="flex flex-col items-center gap-2 bg-white/50 px-8 py-5 rounded-3xl border border-brand-burgundy/5 shadow-sm">
                    <span class="text-xs font-black text-brand-burgundy/80 uppercase tracking-widest">تصميم وتطوير
                        المنيو</span>
                    <div class="flex items-center gap-4 mt-1">
                        <span class="font-black text-brand-burgundy text-xl">Abduirhman Salem</span>
                        <a href="https://wa.me/966550340929" target="_blank"
                            class="flex items-center justify-center w-10 h-10 rounded-full bg-[#25D366] text-white shadow-lg hover:scale-110 hover:shadow-xl transition-all">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ ضع إعدادات مشروع Firebase الخاص بك هنا ⚠️
        const firebaseConfig = {
            apiKey: "ضع_مفتاح_API_هنا",
            authDomain: "project-id.firebaseapp.com",
            projectId: "project-id",
            storageBucket: "project-id.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456:web:abcd"
        };

        // Initialize Firebase ONLY if config is changed from default
        let db;
        if (firebaseConfig.apiKey !== "ضع_مفتاح_API_هنا") {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        }

        window.firebaseSaveOrder = async (orderData) => {
            if (!db) return { success: false };
            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    ...orderData,
                    createdAt: serverTimestamp(),
                    status: 'new'
                });
                return { success: true, id: docRef.id };
            } catch (e) {
                console.error("Error adding document: ", e);
                return { success: false, error: e.message };
            }
        };
    </script>

                filteredItems() {
                    return this.menuItems.filter(i => i.category === this.activeCategory);
                },
                addToCart(item, variant = null) {
                    const cartId = `${item.id}-${variant?.label || 'default'}`;
                    const existing = this.cart.find(i => i.cartId === cartId);

                    if (existing) {
                        existing.quantity++;
                    } else {
                        this.cart.push({
                            ...item,
                            cartId: cartId,
                            selectedVariant: variant,
                            quantity: 1
                        });
                    }

                    this.notification.message = `تم إضافة ${item.name} للسلة`;
                    this.notification.show = true;
                    setTimeout(() => this.notification.show = false, 2000);
                },
                removeFromCart(id) {
                    this.cart = this.cart.filter(i => i.cartId !== id);
                },
                updateQty(id, delta) {
                    const item = this.cart.find(i => i.cartId === id);
                    if (item) {
                        item.quantity = Math.max(1, item.quantity + delta);
                    }
                },
                itemTotal(item) {
                    const price = item.selectedVariant?.price || item.price || 0;
                    return price * item.quantity;
                },
                calculateSubtotal() {
                    return this.cart.reduce((acc, item) => acc + this.itemTotal(item), 0);
                },
                calculateTotal() {
                    return this.calculateSubtotal() + (this.orderType === 'delivery' ? 10 : 0);
                },
                cartItemsCount() {
                    return this.cart.reduce((acc, item) => acc + item.quantity, 0);
                },
                async submitOrder() {
                    if (!this.customerName.trim()) {
                        this.notification.message = 'فضلاً أدخل الاسم لإتمام الطلب';
                        this.notification.show = true;
                        setTimeout(() => this.notification.show = false, 3000);
                        return;
                    }

                    if (this.orderType === 'delivery' && !this.customerAddress.trim()) {
                        this.notification.message = 'فضلاً أدخل عنوان التوصيل';
                        this.notification.show = true;
                        setTimeout(() => this.notification.show = false, 3000);
                        return;
                    }

                    // حفظ في الداتا بيز إذا كان Firebase مفعل
                    if (window.firebaseSaveOrder && window.firebaseConfig?.apiKey !== "ضع_مفتاح_API_هنا") {
                        await window.firebaseSaveOrder({
                            customerName: this.customerName,
                            orderType: this.orderType,
                            notes: this.orderNotes,
                            total: this.calculateTotal(),
                            items: this.cart.map(i => ({
                                name: i.name,
                                variant: i.selectedVariant?.label || null,
                                quantity: i.quantity,
                                price: i.selectedVariant?.price || i.price
                            }))
                        });
                    }

                    this.sendToWhatsApp();
                },
                sendToWhatsApp() {
                    const itemsText = this.cart.map(item =>
                        `- ${item.name} ${item.selectedVariant ? `[${item.selectedVariant.label}]` : ''} (${item.quantity}×)`
                    ).join('\n');

                    const message = `*طلب جديد من مطعم دبل*\n\n` +
                        `*الاسم:* ${this.customerName}\n` +
                        (this.orderType === 'delivery' && this.customerAddress ? `*العنوان:* ${this.customerAddress}\n` : '') +
                        `*الطلب:*\n${itemsText}\n\n` +
                        (this.orderNotes ? `*ملاحظات:* ${this.orderNotes}\n\n` : '') +
                        `*الاستلام:* ${this.orderType === 'delivery' ? 'توصيل (+10 ريال)' : 'استلام من الفرع'}\n` +
                        `*الإجمالي:* ${this.calculateTotal()} ريال\n\n` +
                        `شكراً لاختياركم دبل!`;

                    window.open(`https://wa.me/966555107546?text=${encodeURIComponent(message)}`, '_blank');
                    this.cart = [];
                    this.showCart = false;
                    this.notification.message = 'تم إرسال طلبك بنجاح!';
                    this.notification.show = true;
                    setTimeout(() => this.notification.show = false, 4000);
                }
            }
